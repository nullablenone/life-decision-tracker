<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activities - Life Decision Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary);
            margin: 0;
        }

        .nav-link {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
            border: 1px solid #e2e8f0;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text);
        }

        input,
        select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
        }

        button {
            background: var(--primary);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .activity-list {
            list-style: none;
            padding: 0;
        }

        .activity-item {
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
            box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .activity-info h4 {
            margin: 0;
            font-size: 1.1rem;
        }

        .activity-info p {
            margin: 0.25rem 0 0;
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .category-badge {
            font-size: 0.75rem;
            background: #e0e7ff;
            color: #4338ca;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>My Activities</h1>
            <a href="/" class="nav-link">← Back to Dashboard</a>
        </header>

        <div class="card">
            <h3>Add New Activity</h3>
            <form action="/activities" method="POST">
                <div class="form-group">
                    <label for="title">What did you do?</label>
                    <input type="text" id="title" name="title" placeholder="e.g. Learned Go Lang" required>
                </div>
                <div class="form-group">
                    <label for="decision_id">Which category does it fit?</label>
                    <select id="decision_id" name="decision_id" required>
                        <option value="">Select a category</option>
                        {{ range .categories }}
                        <option value="{{ .ID }}">{{ .Name }} (Value: {{ .Value }})</option>
                        {{ end }}
                    </select>
                </div>
                <button type="submit">Save Activity</button>
            </form>
        </div>

    </div>
</body>

</html>
