{{ template "header.html" . }}
<header>
    <div>
        <h1>LifeTracker.</h1>
        <p class="subtitle">Dictionary & Guidelines</p>
    </div>
    <a href="/start" class="btn-primary">Create New Board &rarr;</a>
</header>

<div class="card" style="padding: 0;">
    <table>
        <thead>
            <tr>
                <th>Category</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody>
            {{ range .categories }}
            <tr>
                <td style="font-weight: 800; font-size: 1.1rem; color: {{ .Color }};">{{ .Name }}</td>
                <td style="color: var(--text-light);">{{ .Description }}</td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>
{{ template "footer.html" . }}
